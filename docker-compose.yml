services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      database:
        condition: service_healthy
    networks:
      - p3-aau-football
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/football
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    # Uncomment ports for development:
    #ports:
    #  - "8080:8080"
    restart: always

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URI: http://backend:8080
    ports:
      - "80:3000"
    networks:
      - p3-aau-football
    environment:
      BACKEND_URI: http://backend:8080
    restart: always
    depends_on:
      - backend

  database:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: football
      PGDATA: /data/postgres
    networks:
      - p3-aau-football
    # Uncomment ports for development:
    #ports:
    #  - "27018:27017"
    volumes:
      - "./db:/data/postgres:rw"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "root", "-d", "football"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  p3-aau-football:
